name: Perf report

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario key (empty = all)"
        required: false
        default: ""
      iterations:
        description: "Override iterations (empty = manifest default)"
        required: false
        default: ""
  schedule:
    # Nightly at 04:30 UTC. Mirror connected-tests.yml cadence so reports
    # land in the same nightly review window.
    - cron: "30 4 * * *"

jobs:
  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: 'npm'
      - run: npm ci
      - name: Resolve Playwright version
        id: pw-version
        run: |
          PW_VERSION=$(node -e "const p=require('./package-lock.json');\
            const pkg=p.packages && (p.packages['node_modules/playwright']||p.packages['node_modules/playwright-core']);\
            if(!pkg)throw new Error('playwright not in lockfile');\
            console.log(pkg.version)")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run harness
        run: |
          if [ -n "${{ github.event.inputs.scenario }}" ]; then
            node scripts/perf/bench.mjs --scenario "${{ github.event.inputs.scenario }}" ${{ github.event.inputs.iterations && format('--iterations {0}', github.event.inputs.iterations) || '' }}
          else
            node scripts/perf/bench.mjs
          fi
      - name: Compare against committed baseline
        id: compare
        shell: bash
        run: |
          set -o pipefail

          latest="$(
            node -e '
              const fs = require("fs");
              const path = require("path");
              const dir = "output/perf";
              const files = fs.readdirSync(dir)
                .filter((name) => /^run-.*\.json$/.test(name))
                .map((name) => path.join(dir, name))
                .sort((a, b) => fs.statSync(b).mtimeMs - fs.statSync(a).mtimeMs);
              if (!files[0]) process.exit(1);
              console.log(files[0]);
            '
          )"
          compare_status=0
          node scripts/perf/compare-perf.mjs docs/perf/baseline-2026-05-16.json "$latest" \
            | tee /tmp/perf-report.md || compare_status=$?
          echo "exit=$compare_status" >> "$GITHUB_OUTPUT"
        continue-on-error: true
      - name: Post markdown summary
        if: always()
        run: |
          {
            echo "# Perf report"
            echo
            cat /tmp/perf-report.md 2>/dev/null || echo "(no report produced)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload JSON artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: perf-${{ github.run_id }}
          path: output/perf/
          retention-days: 30
      - name: Fail on regression
        if: steps.compare.outputs.exit != '0'
        run: |
          echo "::error::Perf regression detected — see job summary."
          exit 1
