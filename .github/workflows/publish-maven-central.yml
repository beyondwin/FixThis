name: Publish Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish Maven artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in MAVEN_CENTRAL_USERNAME MAVEN_CENTRAL_PASSWORD SIGNING_KEY SIGNING_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error title=Missing secret::$name is required for Maven Central publication"
              exit 1
            fi
          done

      - name: Publish Maven artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          version="${version#v}"
          ./gradlew \
            :fixthis-compose-core:publishMavenPublicationToCentralPortalRepository \
            :fixthis-compose-sidekick:publishDebugPublicationToCentralPortalRepository \
            -PFIXTHIS_VERSION="$version" \
            --no-daemon
