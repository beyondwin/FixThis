name: Publish npm wrapper and MCP Registry metadata

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix, for example 0.2.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-mcp-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm package and MCP metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      MCP_PUBLISHER_VERSION: "1.8.0"
      MCP_PUBLISHER_SHA256_LINUX_AMD64: "1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/tags/v${{ inputs.version }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify requested version
        shell: bash
        working-directory: npm/fixthis
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error title=Invalid release version::$RELEASE_VERSION is not a supported SemVer release"
            exit 2
          fi
          tag_commit="$(git -C ../.. rev-parse "refs/tags/v${RELEASE_VERSION}^{commit}")"
          test "$(git -C ../.. rev-parse HEAD)" = "$tag_commit"
          test "$(node -p 'require("./package.json").name')" = "@beyondwin/fixthis"
          test "$(node -p 'require("./package.json").version')" = "$RELEASE_VERSION"
          test "$(node -p 'require("./package.json").mcpName')" = "io.github.beyondwin/fixthis"

      - name: Test npm wrapper and registry metadata
        run: node --test scripts/npm-wrapper-test.mjs scripts/mcp-registry-metadata-test.mjs

      - name: Check whether npm version is already public
        id: npm-status
        shell: bash
        run: |
          set -euo pipefail
          response="$RUNNER_TEMP/npm-version.json"
          status="$(
            curl --silent --show-error --location \
              --retry 3 --retry-all-errors \
              --output "$response" \
              --write-out "%{http_code}" \
              "https://registry.npmjs.org/@beyondwin%2Ffixthis/$RELEASE_VERSION"
          )"
          case "$status" in
            200)
              published="$(jq -r '.version // empty' "$response")"
              test "$published" = "$RELEASE_VERSION"
              echo "already_published=true" >> "$GITHUB_OUTPUT"
              echo "@beyondwin/fixthis@$RELEASE_VERSION is already public; continuing with MCP Registry publication."
              ;;
            404)
              echo "already_published=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error title=npm registry check failed::HTTP $status while checking @beyondwin/fixthis@$RELEASE_VERSION"
              exit 1
              ;;
          esac

      - name: Publish package to npm
        if: steps.npm-status.outputs.already_published != 'true'
        working-directory: npm/fixthis
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Install mcp-publisher
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/mcp-publisher_linux_amd64.tar.gz"
          curl --fail --silent --show-error --location --retry 3 \
            "https://github.com/modelcontextprotocol/registry/releases/download/v$MCP_PUBLISHER_VERSION/mcp-publisher_linux_amd64.tar.gz" \
            --output "$archive"
          printf '%s  %s\n' "$MCP_PUBLISHER_SHA256_LINUX_AMD64" "$archive" | sha256sum --check
          tar -xzf "$archive" mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
