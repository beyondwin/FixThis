name: Publish Gradle Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-gradle-plugin-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Gradle Plugin Portal artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
      GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
      RELEASE_TAG: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.version }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in GRADLE_PUBLISH_KEY GRADLE_PUBLISH_SECRET; do
            if [[ -z "${!name}" ]]; then
              echo "::error title=Missing secret::$name is required for Gradle Plugin Portal publication"
              exit 1
            fi
          done

      - name: Verify requested version contract
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error title=Invalid release tag::$RELEASE_TAG is not a supported release tag"
            exit 2
          fi
          tag_commit="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"
          test "$(git rev-parse HEAD)" = "$tag_commit"
          version="$RELEASE_TAG"
          version="${version#v}"
          ./gradlew -p fixthis-gradle-plugin \
            test \
            -PFIXTHIS_VERSION="$version" \
            --no-daemon

      - name: Check whether Gradle Plugin Portal version is already public
        id: plugin-status
        shell: bash
        run: |
          set -euo pipefail
          version="$RELEASE_TAG"
          version="${version#v}"
          url="https://plugins.gradle.org/plugin/io.github.beyondwin.fixthis.compose/$version"
          status="$(
            curl --silent --show-error --location --retry 3 --retry-all-errors \
              --output /dev/null --write-out "%{http_code}" "$url"
          )"
          case "$status" in
            200)
              echo "already_published=true" >> "$GITHUB_OUTPUT"
              ;;
            400|404)
              echo "already_published=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error title=Gradle Plugin Portal check failed::HTTP $status while checking $url"
              exit 1
              ;;
          esac

      - name: Publish Gradle plugin
        if: steps.plugin-status.outputs.already_published != 'true'
        shell: bash
        run: |
          set -euo pipefail
          version="$RELEASE_TAG"
          version="${version#v}"
          ./gradlew \
            :fixthis-gradle-plugin:publishPlugins \
            -PFIXTHIS_VERSION="$version" \
            --no-daemon

      - name: Confirm plugin version already public
        if: steps.plugin-status.outputs.already_published == 'true'
        run: echo "FixThis $RELEASE_TAG is already public on the Gradle Plugin Portal."
